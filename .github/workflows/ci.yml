name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Ruff lint
        run: ruff check .

      - name: Run test suite
        env:
          JANUS_TEST_MODE: "1"
        run: pytest

      - name: Run e2e suite
        env:
          JANUS_TEST_MODE: "1"
        run: pytest -m e2e
